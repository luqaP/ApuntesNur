<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Apuntes NUR</title>
    <link rel="stylesheet" href="/css/estilos.css">
</head>
<body>

<div class="contenedor-login">
    <h1>Apuntes NUR</h1>
    <p>Ingresa tus credenciales para continuar.</p>

    <form action="/login" method="POST">
        <div class="grupo-input">
            <label for="aliasUsuario">Nombre de Usuario</label>
            <input type="text" id="aliasUsuario" name="aliasUsuario" required>
        </div>

        <div class="grupo-input">
            <label for="claveUsuario">Contraseña</label>
            <input type="password" id="claveUsuario" name="claveUsuario" required>
        </div>

        <button type="submit" class="boton-ingresar">Iniciar Sesión</button>
    </form>
    <br>
    <a href="/registro.html" style="color: #3498db; text-decoration: none; font-weight: bold; font-size: 14px;">¿No tienes cuenta? Regístrate aquí</a>

</div>

</body>
</html>
