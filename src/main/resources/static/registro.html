<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - Apuntes NUR</title>
    <link rel="stylesheet" href="/css/estilos.css">
</head>
<body>

<div class="contenedor-login">
    <h1>Únete a la Plataforma</h1>
    <p>Crea tu cuenta para empezar a compartir y descargar apuntes.</p>

    <form action="/registrar-usuario" method="POST">

        <div class="grupo-input">
            <label for="aliasUsuario">Nombre de Usuario (Alias)</label>
            <input type="text" id="aliasUsuario" name="aliasUsuario" placeholder="Ej: lucca_dev" required>
        </div>
        <div class="input-grupo" style="position: relative;">
            <input type="password" id="campoContrasena" name="contrasena" placeholder="Contraseña" required>
            <button type="button" onclick="alternarVisibilidad()" style="position: absolute; right: 10px;">👁️</button>
        </div>

        <script>
            // Función pública para manipular el atributo 'type' del elemento HTML.
            function alternarVisibilidad() {
                // Obtenemos la referencia al elemento input mediante su ID único.
                var campo = document.getElementById("campoContrasena");
                // Evaluamos si el tipo actual es 'password' para cambiarlo a 'text'.
                if (campo.type === "password") {
                    // Cambiamos el tipo a texto para revelar los caracteres al usuario.
                    campo.type = "text";
                } else {
                    // Revertimos a 'password' para volver a enmascarar la entrada.
                    campo.type = "password";
                }
                // Cerramos la función de visibilidad.
            }
        </script>

        <div class="grupo-input">
            <label for="nombreCompleto">Nombre Completo</label>
            <input type="text" id="nombreCompleto" name="nombreCompleto" required>
        </div>

        <div class="grupo-input">
            <label for="numeroCredencial">Registro NUR</label>
            <input type="text" id="numeroCredencial" name="numeroCredencial" placeholder="Ej: REG-2026" required>
        </div>

        <div class="grupo-input">
            <label for="claveUsuario">Contraseña Segura</label>
            <input type="password" id="claveUsuario" name="claveUsuario" required>
        </div>

        <button type="submit" class="boton-ingresar">Crear Mi Cuenta</button>
    </form>

    <br>
    <a href="/" style="color: #3498db; text-decoration: none; font-weight: bold; font-size: 14px;">¿Ya tienes cuenta? Inicia Sesión aquí</a>
</div>

</body>
</html>
